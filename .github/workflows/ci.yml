name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

  benchmark:
    name: Benchmark (Criterion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Criterion hot-path benchmarks
        run: cargo bench -p data-loader --bench hot_path -- --noplot

  wheel:
    name: Build wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: auto
          # manylinux2014 cross GCC is too old for aws-lc-sys (C11/stdatomic, -march armv8.4) and
          # ring's AArch64 asm needs __ARM_ARCH when preprocessing .S files.
          - target: aarch64
            manylinux: "2_28"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          CFLAGS_aarch64_unknown_linux_gnu: -D__ARM_ARCH=8
          CXXFLAGS_aarch64_unknown_linux_gnu: -D__ARM_ARCH=8
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # Pass through to the cross-compilation container (required for ring + aws-lc-sys on aarch64).
          docker-options: ${{ matrix.target == 'aarch64' && '-e CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8 -e CXXFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8' || '' }}
          args: --release --out dist -m py-runtime/Cargo.toml -i python3.12
          # Distro packages in manylinux images are often ancient protoc (proto2-only). proto-gen needs proto3.
          before-script-linux: |
            set -euxo pipefail
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y curl unzip ca-certificates
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl unzip ca-certificates
            else
              echo "No apt-get or yum"; exit 1
            fi
            PB_VERSION=25.1
            case "$(uname -m)" in
              x86_64|amd64) PB_ARCH=linux-x86_64 ;;
              aarch64|arm64) PB_ARCH=linux-aarch_64 ;;
              *) echo "unknown container arch: $(uname -m)"; exit 1 ;;
            esac
            curl -sSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PB_VERSION}/protoc-${PB_VERSION}-${PB_ARCH}.zip" -o /tmp/protoc.zip
            unzip -o /tmp/protoc.zip -d /usr/local
            chmod +x /usr/local/bin/protoc
            export PATH="/usr/local/bin:$PATH"
            protoc --version

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.target }}
          path: dist
